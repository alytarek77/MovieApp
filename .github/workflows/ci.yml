name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push (Hammer Method)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Forces a single image type that Render understands
          platforms: linux/amd64
          tags: |
            alytarek77/my-new-app:latest
            alytarek77/my-new-app:v1
            alytarek77/my-new-app:${{ github.sha }}

  deploy:
    needs: build-test-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_URL }}"
